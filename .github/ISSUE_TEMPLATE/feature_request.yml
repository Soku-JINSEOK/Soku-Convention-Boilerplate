name: ✨ Feature request
description: Propose a new capability
title: "✨ feat(scope): "
labels:
  - type:feature
projects:
  - Soku-JINSEOK/2
body:
  - type: markdown
    attributes:
      value: English is the normative source. Korean and Japanese summaries must preserve the same scope, verification, security, and risk boundaries.
  - type: textarea
    id: english
    attributes:
      label: 🇬🇧 English — Normative Source
      description: Replace every comment with concrete issue content.
      value: |
        ### 🎯 Goal

        <!-- State the outcome and rationale. -->

        ### 📦 Scope

        <!-- List included and excluded work, constraints, dependencies, and approval boundaries. -->

        ### ✅ Acceptance Criteria

        <!-- Record observable completion criteria. -->

        ### 🔒️ Security Boundary

        <!-- Confirm non-destructive behavior, secret handling, user data, and delivery state. -->

        ### 🧪 Verification (planned)

        <!-- List only checks that will establish completion. -->

        ### ⚠️ Risks and Follow-up

        <!-- Record compatibility, migration, cost, delivery, and remaining risks. -->
    validations:
      required: true
  - type: textarea
    id: summary_ko
    attributes:
      label: 🇰🇷 한국어 요약
      description: 영문 원문의 범위와 안전 조건을 약화하지 않고 요약합니다.
      value: |
        ### 🎯 목표

        <!-- 목표와 기대 결과를 요약합니다. -->

        ### 📦 핵심 범위

        <!-- 포함 범위, 제외 범위, 제약 조건과 승인 경계를 요약합니다. -->

        ### 🧪 검증(예정)

        <!-- 완료 여부를 확인할 검증을 요약합니다. -->

        ### 🔒️ 비파괴 조건

        <!-- 보안, 비밀정보, 사용자 데이터와 delivery 상태를 요약합니다. -->

        ### ⚠️ 잔여 위험과 후속 작업

        <!-- 호환성, migration, 비용, delivery와 잔여 위험을 요약합니다. -->
    validations:
      required: true
  - type: textarea
    id: summary_ja
    attributes:
      label: 🇯🇵 日本語の要約
      description: 英語の原文にある範囲と安全条件を弱めずに要約してください。
      value: |
        ### 🎯 目標

        <!-- 目標と期待する結果を要約します。 -->

        ### 📦 主な範囲

        <!-- 対象、対象外、制約、承認境界を要約します。 -->

        ### 🧪 検証(予定)

        <!-- 完了を確認する検証を要約します。 -->

        ### 🔒️ 非破壊条件

        <!-- security、secret、ユーザーデータ、delivery状態を要約します。 -->

        ### ⚠️ 残存リスクと後続作業

        <!-- compatibility、migration、cost、delivery、残存リスクを要約します。 -->
    validations:
      required: true
  - type: textarea
    id: ai_assistance
    attributes:
      label: 🤖 AI Assistance
      description: Replace the placeholder with every tool used or None.
      value: |
        - **Planning:** <actual tool or None>
    validations:
      required: true
