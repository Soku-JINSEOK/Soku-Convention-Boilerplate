name: 🔧 Chore or maintenance
description: Track operational or maintenance work
title: '🔧 chore(scope): '
labels:
- type:chore
assignees:
- Soku-JINSEOK
projects:
- Soku-JINSEOK/2
body:
- type: markdown
  attributes:
    value: English is the normative source. Korean/Japanese summaries, priority, and area are optional; task fields, non-destructive boundary, acceptance, and security conditions remain required.
- type: textarea
  id: goal
  attributes:
    label: 🎯 Goal
    description: Explain the operational outcome.
  validations:
    required: true
- type: textarea
  id: work
  attributes:
    label: 📦 Planned work and constraints
    description: Define scope, exclusions, and approval boundaries.
  validations:
    required: true
- type: textarea
  id: acceptance
  attributes:
    label: ✅ Acceptance criteria
    description: Define observable completion criteria.
  validations:
    required: true
- type: dropdown
  id: priority
  attributes:
    label: ⚠️ Priority
    options:
    - P0 - critical
    - P1 - high
    - P2 - normal
    - P3 - low
  validations:
    required: false
- type: dropdown
  id: area
  attributes:
    label: 📦 Area
    options:
    - standards
    - templates
    - automation
    - ci
    - docs
    - security
  validations:
    required: false
- type: checkboxes
  id: safety
  attributes:
    label: 🔒️ Non-destructive boundary
    options:
    - label: This work preserves user data, custom labels, secrets, and approval boundaries.
      required: true
  validations:
    required: true
- type: markdown
  attributes:
    value: '🧪 Profile checks:


      - `npm test`

      - `npm run lint`

      - `git diff --check`'
- type: textarea
  id: summary_ko
  attributes:
    label: 🇰🇷 한국어 요약
    description: 목표, 변경 범위, 비파괴 조건, 검증 기준을 요약하세요.
  validations:
    required: false
- type: textarea
  id: summary_ja
  attributes:
    label: 🇯🇵 日本語の要約
    description: 目標、変更範囲、非破壊条件、検証基準を要約してください。
  validations:
    required: false
- type: textarea
  id: ai_assistance
  attributes:
    label: 🤖 AI Assistance
    description: Record every tool used or None.
    value: '- **Planning/implementation/drafting:** <actual tool or None>'
  validations:
    required: false
