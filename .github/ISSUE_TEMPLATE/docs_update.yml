name: 📚 Documentation update
description: Propose an operational or overview documentation change
title: '📚 docs(scope): '
labels:
- type:docs
assignees:
- Soku-JINSEOK
projects:
- Soku-JINSEOK/2
body:
- type: markdown
  attributes:
    value: English is the normative source. Korean and Japanese summaries are required and must not weaken approval, security, or verification conditions.
- type: textarea
  id: goal
  attributes:
    label: 🎯 Documentation goal and audience
    description: Explain the intended outcome and readers.
  validations:
    required: true
- type: textarea
  id: content
  attributes:
    label: 📦 Proposed content and structure
    description: Define scope and language-policy constraints.
  validations:
    required: true
- type: textarea
  id: acceptance
  attributes:
    label: ✅ Acceptance criteria
    description: Define observable completion criteria.
  validations:
    required: true
- type: dropdown
  id: priority
  attributes:
    label: ⚠️ Priority
    options:
    - P0 - critical
    - P1 - high
    - P2 - normal
    - P3 - low
  validations:
    required: true
- type: dropdown
  id: area
  attributes:
    label: 📦 Area
    options:
    - standards
    - templates
    - automation
    - ci
    - docs
    - security
  validations:
    required: true
- type: textarea
  id: summary_ko
  attributes:
    label: 🇰🇷 한국어 요약
    description: 목표, 변경 범위, 비파괴 조건, 검증 기준을 요약하세요.
  validations:
    required: true
- type: textarea
  id: summary_ja
  attributes:
    label: 🇯🇵 日本語の要約
    description: 目標、変更範囲、非破壊条件、検証基準を要約してください。
  validations:
    required: true
- type: checkboxes
  id: safety
  attributes:
    label: 🔒️ Non-destructive boundary
    options:
    - label: This work preserves user data, custom labels, secrets, and approval boundaries.
      required: true
  validations:
    required: true
- type: markdown
  attributes:
    value: '🧪 Profile checks:


      - `npm test`

      - `npm run lint`

      - `git diff --check`'
