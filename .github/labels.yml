# Canonical label catalog for repositories based on Soku-Convention-Boilerplate.
# Apply with scripts/sync-labels.sh. Keep this file as the single source of truth —
# do not create labels manually in the GitHub UI without adding them here first.

# type: what kind of work this is
- name: "type:bug"
  color: "d73a4a"
  description: "Something isn't working"
- name: "type:feature"
  color: "a2eeef"
  description: "New capability or improvement"
- name: "type:chore"
  color: "fef2c0"
  description: "Non-feature maintenance, cleanup, or tooling work"
- name: "type:docs"
  color: "0075ca"
  description: "Documentation only"
- name: "type:refactor"
  color: "c5def5"
  description: "Code or structure change with no behavior change"

# priority: how urgently this should be addressed
- name: "priority:p0-critical"
  color: "b60205"
  description: "Drop everything — breaks production or blocks all work"
- name: "priority:p1-high"
  color: "d93f0b"
  description: "Should be addressed in the current cycle"
- name: "priority:p2-normal"
  color: "fbca04"
  description: "Default priority — schedule normally"
- name: "priority:p3-low"
  color: "c2e0c6"
  description: "Nice to have, no urgency"

# status: where this stands in the workflow
- name: "status:triage"
  color: "ededed"
  description: "Not yet reviewed or scoped"
- name: "status:ready"
  color: "0e8a16"
  description: "Scoped and ready to be picked up"
- name: "status:in-progress"
  color: "1d76db"
  description: "Actively being worked on"
- name: "status:blocked"
  color: "b60205"
  description: "Cannot proceed until a dependency is resolved"
- name: "status:done"
  color: "5319e7"
  description: "Completed and verified"

# area: which part of the repository this touches (example set — adapt per project)
- name: "area:docs"
  color: "bfd4f2"
  description: "Documentation and policy files"
- name: "area:standards"
  color: "bfd4f2"
  description: "Standards, governance, and policy conventions"
- name: "area:tooling"
  color: "bfdadc"
  description: "Scripts, formatters, linters, local dev tooling"
- name: "area:ci"
  color: "f9d0c4"
  description: "CI/CD workflows and automation"
- name: "area:templates"
  color: "d4c5f9"
  description: "Copyable starter configuration sets under templates/"
- name: "area:automation"
  color: "c8f7c5"
  description: "Automation workflows and operational orchestration"
- name: "area:security"
  color: "a5b6f7"
  description: "Security boundaries, safeguards, and secret handling"
