name: Validation

on:
  workflow_call:
  pull_request:
    types: [opened, synchronize, reopened, edited]
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository:
    name: Full repository validation
    uses: ./.github/workflows/ci.yml

  templates:
    name: Full runtime-template validation
    uses: ./.github/workflows/templates-ci.yml

  contribution-titles:
    name: Contribution Title Convention
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "24"

      - name: Validate pull request and commit titles
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          node --input-type=module - <<'NODE'
          import {execSync} from 'node:child_process';
          import {
            validateContributionTitle,
          } from './templates/_shared/commitlint/contribution-title.mjs';

          const mergeBase = execSync(
            `git merge-base ${process.env.BASE_SHA} ${process.env.HEAD_SHA}`,
          ).toString().trim();
          const commitTitles = execSync(
            `git log --no-merges --format=%s ${mergeBase}..${process.env.HEAD_SHA}`,
          ).toString().trim().split('\n').filter(Boolean);
          const titles = [process.env.PR_TITLE, ...commitTitles];

          let failed = false;
          for (const title of titles) {
            const result = validateContributionTitle(title);
            if (!result.valid) {
              failed = true;
              console.error(`✗ "${title}"\n  ${result.message}`);
            } else {
              console.log(`✓ "${title}"`);
            }
          }
          if (failed) process.exit(1);
          NODE

  validation-gate:
    name: Validation Gate
    if: always()
    needs:
      - repository
      - templates
      - contribution-titles
    runs-on: ubuntu-latest
    steps:
      - name: Require every validation group
        env:
          REPOSITORY_RESULT: ${{ needs.repository.result }}
          TEMPLATES_RESULT: ${{ needs.templates.result }}
          TITLES_RESULT: ${{ needs.contribution-titles.result }}
        shell: bash
        run: |
          test "$REPOSITORY_RESULT" = success
          test "$TEMPLATES_RESULT" = success
          case "$TITLES_RESULT" in
            success|skipped) ;;
            *) exit 1 ;;
          esac
