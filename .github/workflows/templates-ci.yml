name: Templates CI

# Validates that the stack templates under `templates/` actually build, lint,
# and test successfully — the `repository-hygiene` job in ci.yml only checks
# that these files exist, not that the code inside them works. Each job below
# runs the same commands documented in docs/guides/STACK_CONFIGS.md, so a
# downstream project copying a template has a working baseline.

on:
  workflow_call:

permissions:
  contents: read

jobs:
  javascript-typescript-node:
    name: JS/TS/Node
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/javascript-typescript-node
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "22"
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run format:check

  python:
    name: Python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/python
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - run: pip install -r requirements-lock.txt -e ".[dev]"
      - run: ruff check .
      - run: mypy .
      - run: black --check .
      - run: pytest

  go:
    name: Go
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/go
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version: "1.26"
      - run: go install golang.org/x/tools/cmd/goimports@latest
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          working-directory: templates/go
          version: v2.12.2
      - run: make fmt-check
      - run: make lint
      - run: make test
      - run: make build

  java-spring:
    name: Java/Spring
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/java-spring
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: "21"
      - run: mvn -B verify

  mysql:
    name: MySQL schema
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
          MYSQL_DATABASE: template_check
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --host=127.0.0.1 --port=3306 --protocol=tcp --user=root --silent"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - run: mysql -h 127.0.0.1 -P 3306 -u root template_check < templates/mysql/schema.sql

  postgresql:
    name: PostgreSQL schema
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: template_check
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - env:
          PGPASSWORD: postgres
        run: psql -h 127.0.0.1 -p 5432 -U postgres -d template_check -f templates/postgresql/schema.sql

  gcloud:
    name: gcloud (Dockerfile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - run: docker build -t templates-gcloud-check templates/gcloud

  aws-azure-config:
    name: AWS/Azure config syntax
    runs-on: ubuntu-latest
    # buildspec.yml and azure-pipelines.yml are still placeholders (see the
    # files themselves) — this job only guards against invalid YAML until
    # real build steps replace the placeholders.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "22"
      - run: npx --yes yaml-lint@1.7.0 templates/aws/buildspec.yml templates/azure/azure-pipelines.yml
