name: Pull Request Policy

on:
  workflow_call:

permissions:
  contents: read
  pull-requests: read

jobs:
  policy:
    name: Pull Request Governance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "24"

      - name: Read current pull request metadata and changed files
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" \
            > /tmp/current-pr.json
          gh api --paginate \
            "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/files?per_page=100" \
            --jq '.[].filename' \
            | jq -R -s 'split("\n") | map(select(length > 0))' \
            > /tmp/current-pr-files.json
          jq --slurpfile files /tmp/current-pr-files.json \
            '{pull_request: (. + {changed_files_list: $files[0]})}' \
            /tmp/current-pr.json > /tmp/current-pr-event.json

      - name: Validate pull request contract
        env:
          CURRENT_PR_EVENT_PATH: /tmp/current-pr-event.json
        run: node scripts/pull-request-policy.mjs
