name: Pull Request Policy

on:
  pull_request:
    types: [opened, edited, synchronize, labeled, unlabeled, assigned, unassigned, reopened, ready_for_review, converted_to_draft]

permissions:
  contents: read
  pull-requests: read

jobs:
  policy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0
      - name: Read current pull request metadata
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" \
            | jq '{pull_request: .}' > /tmp/current-pr-event.json
      - name: Validate pull request contract
        env:
          CURRENT_PR_EVENT_PATH: /tmp/current-pr-event.json
        run: node scripts/pull-request-policy.mjs
