name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
    tags:
      - "soku/v*"

jobs:
  # NOTE: This job checks that Soku-Convention-Boilerplate's OWN files exist.
  # It is specific to this repository's file layout. Downstream repositories
  # that sync from this boilerplate should either delete this job or replace
  # `required_files` with their own project's file list — copying it as-is
  # verifies nothing meaningful in a downstream repo.
  # For a CI starting point meant to be copied downstream, see
  # templates/_shared/ci/downstream-ci.yml instead.
  repository-hygiene:
    name: Repository Hygiene (boilerplate self-check)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24"

      - name: Verify baseline documents exist
        shell: bash
        run: |
          required_files=(
            README.md
            README.ko.md
            README.ja.md
            .markdownlint.jsonc
            .gitignore
            BLUEPRINT.md
            CONTRIBUTING.md
            AGENTS.md
            docs/standards/CODE_STYLE.md
            docs/standards/PROJECT_STRUCTURE.md
            docs/standards/GITHUB_STANDARDS.md
            docs/standards/CICD_STANDARDS.md
            docs/standards/RELEASE_AND_SYNC.md
            docs/standards/SOKU_LIFECYCLE.md
            docs/policy/LICENSE_POLICY.md
            docs/policy/SECURITY_POLICY.md
            docs/policy/CLOUD_POLICY.md
            docs/guides/STACK_EXAMPLES.md
            docs/guides/STACK_CONFIGS.md
            docs/guides/README_GUIDE.md
            docs/guides/INIT_GUIDE.md
            docs/guides/APPLICABILITY.md
            docs/guides/LANGUAGE_SELECTION.md
            docs/issues/TASK_REPORT_TEMPLATE.md
            docs/issues/issue-17-task-report.md
            LICENSE
            SECURITY.md
            .editorconfig
            .gitmessage
            .github/PULL_REQUEST_TEMPLATE.md
            .github/COMMENT_TEMPLATES.md
            .github/ISSUE_TEMPLATE/bug_report.yml
            .github/ISSUE_TEMPLATE/chore_task.yml
            .github/ISSUE_TEMPLATE/config.yml
            .github/ISSUE_TEMPLATE/feature_request.yml
            .github/ISSUE_TEMPLATE/docs_update.yml
            .github/ISSUE_TEMPLATE/refactor_proposal.yml
            .github/CODEOWNERS
            .github/workflows/ci.yml
            .github/workflows/templates-ci.yml
            .github/labels.yml
            templates/javascript-typescript-node/package.json
            templates/javascript-typescript-node/tsconfig.json
            templates/javascript-typescript-node/eslint.config.mjs
            templates/javascript-typescript-node/prettier.config.cjs
            templates/javascript-typescript-node/vitest.config.ts
            templates/javascript-typescript-node/src/profile.ts
            templates/javascript-typescript-node/test/profile.test.ts
            templates/python/pyproject.toml
            templates/python/requirements-lock.txt
            templates/python/src/user_profile.py
            templates/python/tests/test_user_profile.py
            templates/go/go.mod
            templates/go/.golangci.yml
            templates/go/Makefile
            templates/go/profile.go
            templates/go/profile_test.go
            templates/java-spring/pom.xml
            templates/java-spring/src/main/resources/application.yml
            templates/java-spring/src/main/java/com/example/profile/User.java
            templates/java-spring/src/main/java/com/example/profile/UserResponse.java
            templates/java-spring/src/main/java/com/example/profile/ProfileMapper.java
            templates/java-spring/src/test/java/com/example/profile/ProfileMapperTest.java
            templates/mysql/schema.sql
            templates/postgresql/schema.sql
            templates/gcloud/cloudbuild.yaml
            templates/gcloud/Dockerfile
            templates/aws/buildspec.yml
            templates/azure/azure-pipelines.yml
            templates/_shared/ci/downstream-ci.yml
            templates/_shared/ci/contribution-title-check.yml
            templates/_shared/commitlint/commitlint.config.mjs
            templates/_shared/commitlint/contribution-title.mjs
            templates/_shared/commitlint/contribution-title.test.mjs
            templates/_shared/agents/README.md
            templates/_shared/agents/frontend-agent.md
            templates/_shared/agents/backend-agent.md
            templates/_shared/agents/app-agent.md
            templates/_shared/agents/db-agent.md
            templates/_shared/agents/infra-agent.md
            templates/_shared/agents/docs-agent.md
            scripts/sync-boilerplate.ps1
            scripts/sync-boilerplate.sh
            scripts/sync-labels.sh
            scripts/setup-git-signing.sh
            scripts/create-release-tag.sh
            scripts/verify-sync-parity.sh
            soku/README.md
            soku/THIRD_PARTY_NOTICES.md
            soku/go.mod
            soku/go.sum
            soku/main.go
            soku/internal/cli/command.go
            soku/internal/cli/command_test.go
            soku/internal/cli/errors.go
            soku/internal/cli/handler.go
            soku/internal/cli/metadata.go
            soku/internal/cli/metadata_test.go
            soku/internal/cli/output.go
            soku/internal/cli/runtime.go
            soku/internal/cli/runtime_test.go
            soku/internal/packagezip/main.go
            soku/install_test.go
            soku/scripts/package.sh
            soku/scripts/package_test.sh
          )

          for file in "${required_files[@]}"; do
            test -f "$file"
          done

      - name: Run contribution-title regression tests
        run: node --test templates/_shared/commitlint/*.test.mjs

      - name: Check Markdown formatting
        run: npx --yes markdownlint-cli2@0.22.1 --config .markdownlint.jsonc "**/*.md" "#node_modules"

      - name: Validate GitHub YAML
        run: npx --yes yaml-lint@1.7.0 .github/*.yml .github/**/*.yml

  sync-parity:
    name: Sync Script Parity (sh vs ps1)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Verify sync-boilerplate.sh and sync-boilerplate.ps1 produce identical output
        run: scripts/verify-sync-parity.sh

  soku-cross-platform:
    name: soku (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    defaults:
      run:
        working-directory: soku

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache-dependency-path: soku/go.sum

      - name: Verify modules
        run: go mod verify

      - name: Run tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...

      - name: Build and smoke test native binary
        shell: bash
        run: |
          binary="$RUNNER_TEMP/soku"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            binary="$RUNNER_TEMP/soku.exe"
          fi
          go build -trimpath -o "$binary" .
          "$binary" --help
          "$binary" --version
          set +e
          "$binary" status
          exit_code=$?
          set -e
          test "$exit_code" -eq 5

  soku-quality:
    name: soku quality and race checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: soku

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache-dependency-path: soku/go.sum

      - name: Run race tests
        run: go test -race ./...

      - name: Check gofmt
        shell: bash
        run: test -z "$(gofmt -l .)"

      - name: Check goimports
        shell: bash
        run: |
          go install golang.org/x/tools/cmd/goimports@v0.48.0
          test -z "$("$(go env GOPATH)/bin/goimports" -l .)"

      - name: Run golangci-lint
        shell: bash
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          "$(go env GOPATH)/bin/golangci-lint" run ./...

  soku-package:
    name: soku five-target package snapshot
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache-dependency-path: soku/go.sum

      - name: Verify archives, checksums, and packaged binary
        run: soku/scripts/package_test.sh

  soku-release:
    name: Publish soku GitHub Release
    if: >-
      startsWith(github.ref, 'refs/tags/soku/v') &&
      github.repository == 'Soku-JINSEOK/Soku-Convention-Boilerplate'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache-dependency-path: soku/go.sum

      - name: Package release assets
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#soku/}"
          commit="$(git rev-parse "$GITHUB_SHA")"
          commit_epoch="$(git show -s --format=%ct "$GITHUB_SHA")"
          built_at="$(date -u -d "@$commit_epoch" +%Y-%m-%dT%H:%M:%SZ)"
          soku/scripts/package.sh \
            --version "$version" \
            --commit "$commit" \
            --built-at "$built_at" \
            --output-dir soku/dist

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME" soku/dist/*
          --verify-tag --notes-from-tag --latest=false
