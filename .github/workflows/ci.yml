            docs/standards/PROJECT_STRUCTURE.md
            docs/standards/GITHUB_STANDARDS.md
            docs/standards/CICD_STANDARDS.md
            docs/standards/RELEASE_AND_SYNC.md
            docs/standards/SOKU_LIFECYCLE.md
            docs/policy/LICENSE_POLICY.md
            docs/policy/SECURITY_POLICY.md
            docs/policy/CLOUD_POLICY.md
            docs/guides/STACK_EXAMPLES.md
            docs/guides/STACK_CONFIGS.md
            docs/guides/README_GUIDE.md
            docs/guides/INIT_GUIDE.md
            docs/guides/APPLICABILITY.md
            docs/guides/LANGUAGE_SELECTION.md
            VERIFICATION_GUIDE.md
            docs/issues/TASK_REPORT_TEMPLATE.md
            docs/releases/v1.0.0.md
            docs/releases/v1.0.1.md
            docs/releases/v1.0.2.md
            docs/releases/soku-v0.1.0.md
            docs/releases/soku-v0.1.1.md
            docs/releases/soku-v0.1.2.md
            docs/releases/soku-v0.1.3.md
            docs/issues/issue-16-task-report.md
            docs/issues/issue-17-task-report.md
            docs/issues/issue-18-task-report.md
            docs/issues/issue-19-task-report.md
            docs/issues/issue-20-task-report.md
            docs/issues/issue-21-task-report.md
            docs/issues/issue-22-task-report.md
            docs/issues/issue-23-task-report.md
            docs/issues/issue-35-task-report.md
            docs/issues/issue-39-task-report.md
            docs/issues/issue-40-task-report.md
            docs/issues/issue-41-task-report.md
            docs/issues/issue-44-task-report.md
            docs/issues/issue-56-task-report.md
            LICENSE
            SECURITY.md
            .editorconfig
            .gitmessage
            .github/PULL_REQUEST_TEMPLATE.md
            .github/COMMENT_TEMPLATES.md
            .github/ISSUE_TEMPLATE/bug_report.yml
            .github/ISSUE_TEMPLATE/chore_task.yml
            .github/ISSUE_TEMPLATE/config.yml
            .github/ISSUE_TEMPLATE/feature_request.yml
            .github/ISSUE_TEMPLATE/docs_update.yml
