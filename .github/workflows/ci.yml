            soku/schema/catalog-core-v1.schema.json
            soku/schema/catalog-index-v2.schema.json
            soku/schema/provider-v1.schema.json
            soku/providers/ai-collaboration/configuration.schema.json
            soku/providers/ai-collaboration/example-config.yml
            soku/providers/ai-collaboration/provider-v1.json
            soku/providers/ai-collaboration/templates/ai-collaboration.yml
            soku/scripts/package.sh
            soku/scripts/package_test.sh
            soku/scripts/run_lifecycle_gate.sh
            soku/testdata/manifest-v1/invalid/credential-source.json
            soku/testdata/manifest-v1/invalid/path-traversal.json
            soku/testdata/manifest-v1/invalid/project-owned-baseline.json
            soku/testdata/manifest-v1/invalid/raw-configuration.json
            soku/testdata/manifest-v1/invalid/token-query.json
            soku/testdata/manifest-v1/valid/complete.json
          )

          for file in "${required_files[@]}"; do
            test -f "$file"
          done

      - name: Run contribution-title regression tests
        run: node --test templates/_shared/commitlint/*.test.mjs

      - name: Run release tag gate regression tests
        run: scripts/verify-release-tag_test.sh

      - name: Check Markdown formatting
        run: >-
          npx --yes markdownlint-cli2@0.22.1 --config .markdownlint.jsonc
          "**/*.md" "#**/node_modules/**"

      - name: Validate GitHub YAML
        run: npx --yes yaml-lint@1.7.0 .github/*.yml .github/**/*.yml

      - name: Validate GitHub Actions semantics
        run: >-
          go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.10
          .github/workflows/*.yml

      - name: Validate shell scripts
        shell: bash
        run: |
          bash -n scripts/*.sh soku/scripts/*.sh
          shellcheck scripts/*.sh soku/scripts/*.sh

  sync-parity:
    name: Sync Script Parity (sh vs ps1)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Parse PowerShell sync script
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            "scripts/sync-boilerplate.ps1",
            [ref]$tokens,
            [ref]$errors
          ) > $null
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_ }
            exit 1
          }

      - name: Verify sync-boilerplate.sh and sync-boilerplate.ps1 produce identical output
        run: scripts/verify-sync-parity.sh

  soku-cross-platform:
    name: soku (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    defaults:
      run:
        working-directory: soku

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.26.x"
          cache-dependency-path: soku/go.sum

      - name: Verify modules
        run: go mod verify

      - name: Run tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...

      - name: Build and smoke test native binary
        shell: bash
        run: |
          binary="$RUNNER_TEMP/soku"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            binary="$RUNNER_TEMP/soku.exe"
          fi
          go build -trimpath -o "$binary" .
          "$binary" --help
          "$binary" --version
          set +e
          "$binary" status
          exit_code=$?
          set -e
          test "$exit_code" -eq 3

  soku-quality:
    name: soku quality and race checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: soku

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.26.x"
          cache-dependency-path: soku/go.sum

      - name: Run race tests
        run: go test -race ./...

      - name: Check gofmt
        shell: bash
        run: test -z "$(gofmt -l .)"

      - name: Check goimports
        shell: bash
        run: |
          go install golang.org/x/tools/cmd/goimports@v0.48.0
          test -z "$("$(go env GOPATH)/bin/goimports" -l .)"

      - name: Run golangci-lint
        shell: bash
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          "$(go env GOPATH)/bin/golangci-lint" run ./...

  soku-core-lifecycle:
    name: soku lifecycle conformance (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    defaults:
      run:
        working-directory: soku

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.26.x"
          cache-dependency-path: soku/go.sum

      - name: Run hermetic lifecycle conformance gate
        shell: bash
        run: scripts/run_lifecycle_gate.sh "$RUNNER_TEMP/soku-lifecycle-conformance"

      - name: Fetch pinned external provider conformance fixture
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SOKU_PROVIDER_NETWORK_CONFORMANCE: "1"
        run: >-
          go test -count=1 -timeout=2m
          -run '^TestProviderNetworkConformance$'
          ./internal/lifecyclee2e

      - name: Retain sanitized failure diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: soku-lifecycle-conformance-${{ matrix.os }}
          path: ${{ runner.temp }}/soku-lifecycle-conformance/lifecycle-conformance.log
          if-no-files-found: error
          retention-days: 3

  soku-package:
    name: soku five-target package snapshot
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.26.x"
          cache-dependency-path: soku/go.sum

      - name: Verify archives, checksums, and packaged binary
        run: soku/scripts/package_test.sh
