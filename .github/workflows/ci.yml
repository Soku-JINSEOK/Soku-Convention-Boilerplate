name: Repository CI

on:
  workflow_call:

permissions:
  contents: read

jobs:
  # NOTE: This job checks that Soku-Convention-Boilerplate's OWN files exist.
  # It is specific to this repository's file layout. Downstream repositories
  # that sync from this boilerplate should either delete this job or replace
  # `required_files` with their own project's file list — copying it as-is
  # verifies nothing meaningful in a downstream repo.
  # For a CI starting point meant to be copied downstream, see
  # templates/_shared/ci/downstream-ci.yml instead.
  repository-hygiene:
    name: Repository Hygiene (boilerplate self-check)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "24"

      - name: Setup Go for workflow validation
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.26.x"

      - name: Verify baseline documents exist
        shell: bash
        run: |
          required_files=(
            README.md
            README.ko.md
            README.ja.md
            .markdownlint.jsonc
            .gitleaks.toml
            .gitignore
            BLUEPRINT.md
            CONTRIBUTING.md
            AGENTS.md
