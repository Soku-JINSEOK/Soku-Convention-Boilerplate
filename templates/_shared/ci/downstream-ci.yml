name: CI

# Starter CI workflow for downstream repositories that adopt this boilerplate.
# Uncomment the job(s) matching your stack and delete the rest.
# This file does not check for this boilerplate's own files (see .github/workflows/ci.yml
# in Soku-Convention-Boilerplate for that repository-hygiene check).
# Each commented job mirrors a job actually run and verified in
# Soku-Convention-Boilerplate's own .github/workflows/templates-ci.yml.

on:
  pull_request:
  push:
    branches:
      - main

